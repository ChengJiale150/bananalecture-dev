services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chengjiale150/bananalecture-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - path: .env.backend
        required: true
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    networks:
      - bananalecture_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: chengjiale150/bananalecture-frontend:latest
    ports:
      - "3000:3000"
    env_file:
      - path: .env.frontend
        required: true
    depends_on:
      - backend
    networks:
      - bananalecture_network
    restart: unless-stopped

networks:
  bananalecture_network:
    driver: bridge
