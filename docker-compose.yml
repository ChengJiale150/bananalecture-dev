version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bananalecture_backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env.backend
        required: true
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bananalecture_frontend
    ports:
      - "3000:3000"
    env_file:
      - path: .env.frontend
        required: true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
