name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: false
        default: 'latest'
      component:
        description: 'Component to build'
        required: false
        default: 'both'
        type: choice
        options:
        - both
        - backend
        - frontend
      base_path:
        description: 'Base path for frontend (e.g., /banana, leave empty for root)'
        required: false
        default: '/banana'

jobs:
  build-backend:
    if: inputs.component == 'both' || inputs.component == 'backend'
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set version
      id: version
      run: |
        VERSION=${{ github.event.inputs.version || 'latest' }}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        platforms: linux/amd64, linux/arm64
        push: true
        tags: |
          chengjiale150/bananalecture-backend:${{ steps.version.outputs.VERSION }}
          chengjiale150/bananalecture-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-frontend:
    if: inputs.component == 'both' || inputs.component == 'frontend'
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set version
      id: version
      run: |
        VERSION=${{ github.event.inputs.version || 'latest' }}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push frontend Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        platforms: linux/amd64, linux/arm64
        push: true
        tags: |
          chengjiale150/bananalecture-frontend:${{ steps.version.outputs.VERSION }}
          chengjiale150/bananalecture-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NEXT_PUBLIC_BASE_PATH=${{ github.event.inputs.base_path }}
