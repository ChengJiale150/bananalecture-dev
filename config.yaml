APP:
  NAME: bananalecture_backend
  VERSION: 0.1.0
  DEBUG: false
  ENVIRONMENT: production

API:
  V1_STR: /api/v1

SERVER:
  HOST: 0.0.0.0
  PORT: 8000

DATABASE:
  URL: sqlite+aiosqlite:////app/data/data.db

STORAGE:
  DATA_DIR: ./data
  DEFAULT_USER_ID: admin

PAGINATION:
  DEFAULT_PAGE_SIZE: 20
  MAX_PAGE_SIZE: 100

TASKS:
  VIDEO_TASK_DELAY_SECONDS: 0.2

IMAGE_GENERATION:
  API_URL: https://api.chatfire.site/v1/images/generations
  API_KEY: null
  MODEL_LIST:
  - nano-banana-2
  - nano-banana-pro
  REQUEST_TIMEOUT_SECONDS: 300.0
  GENERATION_SIZE: "16:9"
  DOWNLOAD_RETRIES: 3
  DOWNLOAD_RETRY_DELAY_SECONDS: 0.5

DIALOGUE_GENERATION:
  MODEL_NAME: "qwen/qwen3-vl-235b-a22b-instruct"
  PROVIDER:
    BASE_URL: "https://openrouter.ai/api/v1"
    API_KEY: null
  PROFILE: {}
  SETTINGS: {}
  RETRIES: 3

AUDIO_GENERATION:
  PROVIDER:
    GROUP_ID: null
    API_KEY: null
    MODEL: "speech-2.6-turbo"
    REQUEST_TIMEOUT_SECONDS: 60.0
  SAMPLE_RATE: 32000
  BITRATE: 128000
  FORMAT: "mp3"
  MAX_RETRIES: 3
  BASE_DELAY_SECONDS: 5.0
  MAX_DELAY_SECONDS: 60.0
  EXPONENTIAL_BASE: 2.0
  DEFAULT_VOICE_GROUP: "default"
  VOICE_GROUPS:
    default:
      旁白: "Chinese (Mandarin)_Male_Announcer"
      大雄: "ppt2audio_daxiong"
      哆啦A梦: "ppt2audio_duolaameng"
      道具: "ppt2audio_duolaameng"
      其他男声: "Chinese (Mandarin)_Pure-hearted_Boy"
      其他女声: "Chinese (Mandarin)_ExplorativeGirl"
      其他: "Chinese (Mandarin)_Radio_Host"

VIDEO_GENERATION:
  WIDTH: 1366
  HEIGHT: 768
  FPS: 25
  VIDEO_CODEC: "libx264"
  AUDIO_CODEC: "aac"
  AUDIO_BITRATE: 192000
  PIXEL_FORMAT: "yuv420p"
  BACKGROUND_COLOR: "black"
  IMAGE_SCALE_MODE: "contain"
  OUTPUT_FILENAME: "project-video.mp4"
  TEMP_DIR_PREFIX: "video-build-"
